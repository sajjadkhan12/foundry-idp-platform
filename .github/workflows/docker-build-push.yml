name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}/backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}/frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for ${{ matrix.component }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.component == 'backend' && env.BACKEND_IMAGE_NAME || env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image for ${{ matrix.component }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ${{ matrix.component == 'frontend' && 'VITE_API_URL=https://api.foundry-idp.com' || '' }}

      - name: Image digest for ${{ matrix.component }}
        run: echo "${{ steps.meta.outputs.tags }}"
      
      - name: Save image tag for manifest update
        if: github.event_name != 'pull_request'
        id: save-tag
        run: |
          # Extract the primary tag (prefer semver, then branch-sha, then latest)
          # The metadata action outputs tags separated by newlines
          TAGS="${{ steps.meta.outputs.tags }}"
          # Try to find semver tag first (v1.0.0 format), then branch-sha, then latest
          PRIMARY_TAG=$(echo "$TAGS" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || \
                       echo "$TAGS" | grep -E '^[a-z]+-[a-f0-9]+$' | head -n1 || \
                       echo "$TAGS" | grep 'latest' | head -n1 || \
                       echo "$TAGS" | head -n1)
          # Clean up any whitespace
          PRIMARY_TAG=$(echo "$PRIMARY_TAG" | xargs)
          FULL_IMAGE="${{ env.REGISTRY }}/${{ matrix.component == 'backend' && env.BACKEND_IMAGE_NAME || env.FRONTEND_IMAGE_NAME }}:$PRIMARY_TAG"
          echo "tag=$PRIMARY_TAG" >> $GITHUB_OUTPUT
          echo "full_image=$FULL_IMAGE" >> $GITHUB_OUTPUT
          echo "component=${{ matrix.component }}" >> $GITHUB_OUTPUT
          echo "Selected tag: $PRIMARY_TAG"
          echo "Full image: $FULL_IMAGE"
      
      - name: Save image info to file
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p ${{ github.workspace }}/.github
          echo "${{ steps.save-tag.outputs.tag }}" > ${{ github.workspace }}/.github/image-tag-${{ matrix.component }}.txt
          echo "${{ steps.save-tag.outputs.full_image }}" > ${{ github.workspace }}/.github/image-full-${{ matrix.component }}.txt
      
      - name: Upload image info
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: image-info-${{ matrix.component }}
          path: |
            ${{ github.workspace }}/.github/image-tag-${{ matrix.component }}.txt
            ${{ github.workspace }}/.github/image-full-${{ matrix.component }}.txt
          retention-days: 1

  update-k8s-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    
    steps:
      - name: Checkout k8s repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/foundry-idp-k8s
          token: ${{ secrets.K8S_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          path: k8s-manifests
      
      - name: Download image info artifacts
        uses: actions/download-artifact@v4
        with:
          path: image-info
      
      - name: Extract image tags
        id: extract-tags
        run: |
          BACKEND_TAG=$(cat image-info/image-info-backend/image-tag-backend.txt)
          FRONTEND_TAG=$(cat image-info/image-info-frontend/image-tag-frontend.txt)
          BACKEND_IMAGE=$(cat image-info/image-info-backend/image-full-backend.txt)
          FRONTEND_IMAGE=$(cat image-info/image-info-frontend/image-full-frontend.txt)
          
          echo "backend_tag=$BACKEND_TAG" >> $GITHUB_OUTPUT
          echo "frontend_tag=$FRONTEND_TAG" >> $GITHUB_OUTPUT
          echo "backend_image=$BACKEND_IMAGE" >> $GITHUB_OUTPUT
          echo "frontend_image=$FRONTEND_IMAGE" >> $GITHUB_OUTPUT
          
          echo "Backend image: $BACKEND_IMAGE"
          echo "Frontend image: $FRONTEND_IMAGE"
      
      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq
          yq --version
      
      - name: Update backend deployment manifest
        working-directory: k8s-manifests
        run: |
          yq eval ".spec.template.spec.containers[0].image = \"${{ steps.extract-tags.outputs.backend_image }}\"" -i deployment-backend.yaml
          yq eval '.spec.template.spec.containers[0].imagePullPolicy = "IfNotPresent"' -i deployment-backend.yaml
          echo "Updated backend deployment:"
          yq eval '.spec.template.spec.containers[0].image' deployment-backend.yaml
      
      - name: Update frontend deployment manifest
        working-directory: k8s-manifests
        run: |
          yq eval ".spec.template.spec.containers[0].image = \"${{ steps.extract-tags.outputs.frontend_image }}\"" -i deployment-frontend.yaml
          yq eval '.spec.template.spec.containers[0].imagePullPolicy = "IfNotPresent"' -i deployment-frontend.yaml
          echo "Updated frontend deployment:"
          yq eval '.spec.template.spec.containers[0].image' deployment-frontend.yaml
      
      - name: Update worker deployment manifest
        working-directory: k8s-manifests
        run: |
          yq eval ".spec.template.spec.containers[0].image = \"${{ steps.extract-tags.outputs.backend_image }}\"" -i deployment-worker.yaml
          yq eval '.spec.template.spec.containers[0].imagePullPolicy = "IfNotPresent"' -i deployment-worker.yaml
          echo "Updated worker deployment:"
          yq eval '.spec.template.spec.containers[0].image' deployment-worker.yaml
      
      - name: Configure git
        working-directory: k8s-manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit and push changes
        working-directory: k8s-manifests
        env:
          BACKEND_TAG: ${{ steps.extract-tags.outputs.backend_tag }}
          BACKEND_IMAGE: ${{ steps.extract-tags.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ steps.extract-tags.outputs.frontend_image }}
        run: |
          git add deployment-backend.yaml deployment-frontend.yaml deployment-worker.yaml
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update image tags to ${BACKEND_TAG}" -m "- backend: ${BACKEND_IMAGE}" -m "- frontend: ${FRONTEND_IMAGE}" -m "- worker: ${BACKEND_IMAGE}" -m "[skip ci]"
            git push
            echo "Manifests updated and pushed successfully"
          fi

