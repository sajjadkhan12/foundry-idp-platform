syntax = "proto3";

package audit;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

service AuditService {
    // Log an activity
    rpc LogActivity (LogActivityRequest) returns (LogActivityResponse);
    
    // List audit logs (internal/admin usage)
    rpc ListAuditLogs (ListAuditLogsRequest) returns (ListAuditLogsResponse);
}

message LogActivityRequest {
    string user_id = 1;
    string action = 2;
    string resource_type = 3;
    string resource_id = 4;
    google.protobuf.Struct details = 5;
    string ip_address = 6;
    string status = 7; // success, failure
}

message LogActivityResponse {
    bool success = 1;
    string id = 2;
}

message AuditLog {
    string id = 1;
    string user_id = 2;
    string action = 3;
    string resource_type = 4;
    string resource_id = 5;
    google.protobuf.Struct details = 6;
    string ip_address = 7;
    string status = 8;
    google.protobuf.Timestamp created_at = 9;
}

message ListAuditLogsRequest {
    int32 skip = 1;
    int32 limit = 2;
    string user_id = 3;
    string action = 4;
    string resource_type = 5;
    string status = 6;
    google.protobuf.Timestamp start_date = 7;
    google.protobuf.Timestamp end_date = 8;
    string search = 9;
}

message ListAuditLogsResponse {
    repeated AuditLog items = 1;
    int32 total = 2;
}
